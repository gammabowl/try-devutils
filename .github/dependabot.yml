version: 2

updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"

    open-pull-requests-limit: 5

    groups:
      non-breaking-dependencies:
        update-types:
          - "minor"
          - "patch"

    rebase-strategy: "auto"

    commit-message:
      prefix: "chore(deps)"
      include: "scope"

    labels:
      - "dependencies"
      - "npm"
